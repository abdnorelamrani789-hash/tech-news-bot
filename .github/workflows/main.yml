name: Tech News Bot

# تشغيل تلقائي 3 مرات في اليوم + إمكانية التشغيل اليدوي
on:
  schedule:
    # 8:00, 14:00, 20:00 UTC
    - cron: "0 8,14,20 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      # GitHub Secrets
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      # خطوة 1: سحب كل الملفات من المستودع
      - name: Checkout repository
        uses: actions/checkout@v3

      # خطوة 2: تثبيت بايثون
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # خطوة 3: تثبيت المكتبات المطلوبة
      - name: Install dependencies
        run: pip install -r requirements.txt

      # خطوة 4: تشغيل البوت
      - name: Run Tech News Bot
        run: python bot.py
